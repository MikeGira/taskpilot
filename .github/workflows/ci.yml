name: CI — Security + Build + Deploy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── 1. Secret detection ─────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Static analysis ──────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ── 3. Build + TypeScript check ─────────────────────────────────────────────
  build:
    name: Build + TypeCheck
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck
      - name: Next.js build (with placeholder env vars)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://taskpilot.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

  # ── 4. Smoke test production (push to main only) ────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [secret-scan, codeql, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Test homepage returns 200
        run: |
          SITE="${{ secrets.SITE_URL || 'https://taskpilot.vercel.app' }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠ Site returned $STATUS — may still be deploying"
          else
            echo "✅ Site returning 200 OK"
          fi
      - name: Verify security headers
        run: |
          SITE="${{ secrets.SITE_URL || 'https://taskpilot.vercel.app' }}"
          curl -sI "$SITE/" | grep -i "x-content-type-options" && echo "✅ X-Content-Type-Options present" || echo "⚠ Header missing"
          curl -sI "$SITE/" | grep -i "x-frame-options" && echo "✅ X-Frame-Options present" || echo "⚠ Header missing"
          curl -sI "$SITE/" | grep -i "strict-transport-security" && echo "✅ HSTS present" || echo "⚠ Header missing"
